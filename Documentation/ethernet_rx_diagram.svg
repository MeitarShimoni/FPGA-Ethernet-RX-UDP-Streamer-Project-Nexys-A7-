<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1210" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="1210" fill="#ffffff"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">FPGA Ethernet — RX Datapath</text>

  <!-- Legend -->
  <g font-size="12" fill="#333">
    <rect x="580" y="58" width="26" height="14" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
    <text x="612" y="69">implemented</text>
    <rect x="700" y="58" width="26" height="14" fill="#ffffff" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="732" y="69">planned</text>
  </g>

  <!-- Clock domain backgrounds -->
  <rect x="40" y="190" width="490" height="600" fill="#E8F1FB" rx="8"/>
  <rect x="40" y="790" width="490" height="290" fill="#EAF7EC" rx="8"/>
  <text x="52" y="208" font-size="12" font-weight="bold" fill="#4A76A8">clk50 domain — 50 MHz RMII clock</text>
  <text x="52" y="1068" font-size="12" font-weight="bold" fill="#4A8A55">system clock domain</text>

  <!-- ======================= PHY ======================= -->
  <rect x="90" y="70" width="360" height="60" fill="#FFF6E5" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="270" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">LAN8720A PHY</text>
  <text x="270" y="114" text-anchor="middle" font-size="12" fill="#555">on the Nexys A7 board — analog / cable side</text>

  <!-- PHY -> rmii_rx -->
  <line x1="270" y1="130" x2="270" y2="208" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="158" font-size="12" font-family="monospace" fill="#333">rmii_rxd[1:0], rmii_crs_dv</text>
  <text x="285" y="176" font-size="12" font-family="monospace" fill="#333">clk50 (50 MHz ref)</text>

  <!-- ======================= rmii_rx ======================= -->
  <rect x="90" y="210" width="360" height="80" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="270" y="236" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">rmii_rx</text>
  <text x="270" y="256" text-anchor="middle" font-size="12" fill="#555">dibit → byte, alignment on first '01' of preamble</text>
  <text x="270" y="274" text-anchor="middle" font-size="12" fill="#555">CRS_DV end-of-frame filtering</text>

  <!-- rmii_rx -> eth_frame_rx -->
  <line x1="270" y1="290" x2="270" y2="368" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="320" font-size="12" font-family="monospace" fill="#333">rx_data[7:0] + rx_valid</text>
  <text x="285" y="338" font-size="12" font-family="monospace" fill="#333">rx_frame_end</text>

  <!-- ======================= eth_frame_rx ======================= -->
  <rect x="90" y="370" width="360" height="100" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="270" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">eth_frame_rx</text>
  <text x="270" y="416" text-anchor="middle" font-size="12" fill="#555">preamble / SFD hunt · CRC32 residue check</text>
  <text x="270" y="434" text-anchor="middle" font-size="12" fill="#555">4-byte delay line → FCS stripped from output</text>
  <text x="270" y="452" text-anchor="middle" font-size="12" fill="#555">verdict at end of frame: frame_done + frame_ok</text>

  <!-- eth_frame_rx -> mac_filter -->
  <line x1="270" y1="470" x2="270" y2="548" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="500" font-size="12" font-family="monospace" fill="#333">m_data[7:0] + m_valid</text>
  <text x="285" y="518" font-size="12" font-family="monospace" fill="#333">frame_done, frame_ok</text>

  <!-- ======================= mac_filter (planned) ======================= -->
  <rect x="90" y="550" width="360" height="80" fill="#ffffff" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" rx="6"/>
  <text x="270" y="576" text-anchor="middle" font-size="15" font-weight="bold" fill="#444">mac_filter</text>
  <text x="270" y="596" text-anchor="middle" font-size="12" fill="#555">watches bytes 0–5 (destination MAC) as they stream by</text>
  <text x="270" y="614" text-anchor="middle" font-size="12" fill="#555">dst_ok = (DA == our MAC) or (DA == FF:FF:FF:FF:FF:FF)</text>

  <!-- mac_filter -> fifo -->
  <line x1="270" y1="630" x2="270" y2="698" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="656" font-size="12" font-family="monospace" fill="#333">data + valid (pass-through)</text>
  <text x="285" y="674" font-size="12" font-family="monospace" fill="#333">commit = done &amp; ok &amp; dst_ok</text>

  <!-- ======================= eth_packet_fifo ======================= -->
  <rect x="90" y="700" width="360" height="150" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="270" y="724" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">eth_packet_fifo</text>
  <text x="270" y="744" text-anchor="middle" font-size="12" fill="#555">commit / rewind · stores {last, data} per byte</text>
  <text x="270" y="762" text-anchor="middle" font-size="12" fill="#555">wr_ptr (speculative) · wr_ptr_c (committed) — write @ clk50</text>
  <line x1="100" y1="784" x2="440" y2="784" stroke="#B0632F" stroke-width="1.5" stroke-dasharray="7,5"/>
  <text x="270" y="806" text-anchor="middle" font-size="12" fill="#B0632F">CDC boundary — dual-clock version crosses here (gray-coded)</text>
  <text x="270" y="832" text-anchor="middle" font-size="12" fill="#555">read side @ sys_clk — FWFT, whole frames only (!empty ⇒ full frame)</text>

  <!-- fifo -> parsers -->
  <line x1="270" y1="850" x2="270" y2="928" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="880" font-size="12" font-family="monospace" fill="#333">rd_data[7:0], rd_last</text>
  <text x="285" y="898" font-size="12" font-family="monospace" fill="#333">rd_valid / rd_ready</text>

  <!-- ======================= parsers (planned) ======================= -->
  <rect x="90" y="930" width="360" height="100" fill="#ffffff" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" rx="6"/>
  <text x="270" y="956" text-anchor="middle" font-size="15" font-weight="bold" fill="#444">protocol parsers</text>
  <text x="270" y="976" text-anchor="middle" font-size="12" fill="#555">byte 12–13 (EtherType) selects the branch:</text>
  <text x="270" y="994" text-anchor="middle" font-size="12" fill="#555">0x0806 → ARP responder · 0x0800 → IPv4 → ICMP / UDP</text>
  <text x="270" y="1012" text-anchor="middle" font-size="12" fill="#555">milestones: arp -a → ping → UDP stream to PC</text>

  <!-- ======================= TX path (future) ======================= -->
  <rect x="580" y="370" width="260" height="220" fill="#ffffff" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" rx="6"/>
  <text x="710" y="398" text-anchor="middle" font-size="15" font-weight="bold" fill="#444">TX path (future)</text>
  <text x="710" y="424" text-anchor="middle" font-size="12" fill="#555">frame builder (DA / SA / EtherType)</text>
  <text x="710" y="444" text-anchor="middle" font-size="12" fill="#555">payload mux (ARP reply, ICMP, UDP)</text>
  <text x="710" y="464" text-anchor="middle" font-size="12" fill="#555">CRC32 generate → append ~crc</text>
  <text x="710" y="484" text-anchor="middle" font-size="12" fill="#555">preamble + SFD insertion</text>
  <text x="710" y="504" text-anchor="middle" font-size="12" fill="#555">rmii_tx: byte → dibit serializer</text>
  <text x="710" y="530" text-anchor="middle" font-size="12" fill="#555" font-style="italic">reuses the same CRC32 function</text>
  <text x="710" y="548" text-anchor="middle" font-size="12" fill="#555" font-style="italic">as RX — just complemented on TX</text>

  <!-- parsers -> TX -->
  <polyline points="450,980 710,980 710,592" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="475" y="972" font-size="12" font-family="monospace" fill="#666">replies / stream data</text>

  <!-- TX -> PHY -->
  <polyline points="710,370 710,100 452,100" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="722" y="240" font-size="12" font-family="monospace" fill="#666">rmii_txd[1:0]</text>
  <text x="722" y="258" font-size="12" font-family="monospace" fill="#666">rmii_tx_en</text>

  <!-- Bottom note -->
  <text x="60" y="1120" font-size="12" fill="#555">Today everything runs in the clk50 domain (single-clock FIFO). Converting the FIFO to dual-clock moves the</text>
  <text x="60" y="1138" font-size="12" fill="#555">parsers to the system clock — the FIFO then solves frame quarantine and clock crossing in one module.</text>
  <text x="60" y="1166" font-size="12" fill="#555">Dropped frames (bad CRC, wrong MAC, overflow) are rewound inside the FIFO — parsers only ever see clean,</text>
  <text x="60" y="1184" font-size="12" fill="#555">CRC-verified, addressed-to-us frames.</text>
</svg>
